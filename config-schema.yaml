    packageName: "@backstage/integration-aws-node"
  - path: node_modules/@backstage/plugin-events-node/config.d.ts
    value:
      type: object
      properties:
        events:
          type: object
          properties:
            useEventBus:
              description: >-
                Whether to use the event bus API in the events plugin backend to

                distribute events across multiple instances when publishing and

                subscribing to events.


                The default is 'auto', which means means that the event bus API
                will be

                used if it's available, but will be disabled if the events
                backend

                returns a 404.


                If set to 'never', the events service will only ever publish
                events

                locally to the same instance, while if set to 'always', the
                event bus API

                will never be disabled, even if the events backend returns a
                404.
              enum:
                - always
                - auto
                - never
              type: string
