                  description: >-
                    A list of targets to allow outgoing requests to. Users will
                    be able to make

                    requests on behalf of the backend to the targets that are
                    allowed by this list.
                  type: array
                  items:
                    type: object
                    properties:
                      host:
                        description: >-
                          A host to allow outgoing requests to, being either a
                          full host or

                          a subdomain wildcard pattern with a leading `*`. For
                          example `example.com`

