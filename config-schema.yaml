                          type: object
                          properties:
                            accountName:
                              description: Account access name
                              visibility: secret
                              type: string
                            accountKey:
                              description: >-
                                (Optional) Account secret primary key

                                If not set, environment variables will be used
                                to authenticate.
                              visibility: secret
                              type: string
                          required:
                            - accountName
                        containerName:
                          description: (Required) Cloud Storage Container Name
                          type: string
                      required:
                        - containerName
                  required:
                    - type
                - type: object
                  properties:
                    type:
                      type: string
                      const: googleGcs
                    googleGcs:
                      description: Required when 'type' is set to googleGcs
                      type: object
                      properties:
                        bucketName:
                          description: (Required) Cloud Storage Bucket Name
                          type: string
                        credentials:
                          description: >-
                            (Optional) API key used to write to a storage
                            bucket.

                            If not set, environment variables will be used to
                            authenticate.
                          visibility: secret
                          type: string
                        projectId:
                          description: >-
                            (Optional) GCP project ID that contains the bucket.
                            Should be

                            set if credentials is not set, or if the service
