                        Skip rate limiting for requests that have been
                        successful.

                        Defaults to false.
                      type: boolean
                    skipFailedRequests:
                      description: |-
                        Skip rate limiting for requests that have failed.
                        Defaults to false.
                      type: boolean
                    plugin:
                      description: Plugin specific rate limiting configuration
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          window:
                            description: >-
                              Time frame in milliseconds or as human duration
                              for which requests are checked/remembered.

                              Defaults to one minute.
                          incomingRequestLimit:
                            description: >-
                              The maximum number of connections to allow during
