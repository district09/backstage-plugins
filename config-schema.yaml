schemas:
  - packageName: "@backstage/cli"
    value:
      $schema: https://backstage.io/schema/config-v1
      title: "@backstage/cli"
      type: object
      properties:
        app:
          type: object
          properties:
            baseUrl:
              type: string
              visibility: frontend
            title:
              type: string
              visibility: frontend
            datadogRum:
              type: object
              description: Datadog RUM events configuration
              properties:
                env:
                  type: string
                  visibility: frontend
                  description: Environment for Datadog RUM events
                clientToken:
                  type: string
                  visibility: frontend
                  description: clientToken for Datadog RUM events
                applicationId:
                  type: string
                  visibility: frontend
                  description: applicationId for Datadog RUM events
                site:
                  type: string
                  visibility: frontend
                  description: site for Datadog RUM events
                sessionSampleRate:
                  type: number
                  visibility: frontend
                  description: sample rate of Datadog RUM events
                sessionReplaySampleRate:
                  type: number
                  visibility: frontend
                  description: sample rate of session replays based upon already sampled Datadog
                    RUM events
              required:
                - clientToken
                - applicationId
            listen:
              type: object
              description: Listening configuration for local development
              properties:
                host:
                  type: string
                  visibility: frontend
                  description: The host that the frontend should be bound to. Only used for local
                    development.
                port:
                  type: number
                  visibility: frontend
                  description: The port that the frontend should be bound to. Only used for local
                    development.
            https:
              type: object
              description: Only used for local development. The https object is passed to
                webpack in order to enable using https on localhost.
              properties:
                certificate:
                  type: object
                  description: Parent object containing certificate and the private key
                  required:
                    - key
                    - cert
                  properties:
                    key:
                      type: string
                      visibility: secret
                      description: Https Certificate private key. Use $file to load in a file
                    cert:
                      type: string
                      visibility: secret
                      description: Https Certificate. Use $file to load in a file
    path: node_modules/@backstage/cli/package.json
  - packageName: "@backstage/plugin-user-settings"
    value:
      $schema: https://backstage.io/schema/config-v1
      title: "@backstage/user-settings"
      type: object
      properties:
        auth:
          type: object
          properties:
            providers:
              type: object
              additionalProperties:
                type: object
                visibility: frontend
                additionalProperties: true
    path: node_modules/@backstage/plugin-user-settings/package.json
  - path: plugins/migrations-backend/config.d.ts
    value:
      type: object
      properties:
        migrations:
          type: object
          properties:
            schedule:
              description: Frontend root URL
              visibility: frontend
          required:
            - schedule
      required:
        - migrations
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@district09/backstage-plugin-migrations-backend"
  - path: plugins/migrations-backend-module-built-in-checks/config.d.ts
    value:
      type: object
      properties:
        migrations:
          type: object
          properties:
            checks:
              description: various configurations for checks
              visibility: frontend
              type: object
              properties:
                builtIn:
                  description: built-in-checks module configuration
                  visibility: frontend
                  type: object
                  properties:
                    catalogInfo:
                      description: catalog-info.yaml checker configuration
                      visibility: frontend
                      type: array
                      items: {}
      required:
        - migrations
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@district09/backstage-plugin-migrations-backend-module-built-in-checks"
  - path: node_modules/@backstage/core-components/config.d.ts
    value:
      type: object
      properties:
        auth:
          type: object
          properties:
            autologout:
              description: Autologout feature configuration
              type: object
              properties:
                enabled:
                  description: Enable or disable the autologout feature
                  visibility: frontend
                  type: boolean
                idleTimeoutMinutes:
                  description: >-
                    Number of minutes after which the inactive user is logged
                    out automatically.

                    Default is 60 minutes (1 hour)
                  visibility: frontend
                  type: number
                promptBeforeIdleSeconds:
                  description: >-
                    Number of seconds before the idle timeout where the user
                    will be asked if it's still active.

                    A dialog will be shown.

                    Default is 10 seconds.

                    Set to 0 seconds to disable the prompt.
                  visibility: frontend
                  type: number
                useWorkerTimers:
                  description: >-
                    Enable/disable the usage of worker thread timers instead of
                    main thread timers.

                    Default is true.

                    If you experience some browser incompatibility, you may try
                    to set this to false.
                  visibility: frontend
                  type: boolean
                logoutIfDisconnected:
                  description: >-
                    Enable/disable the automatic logout also on users that are
                    logged in but with no Backstage tabs open.

                    Default is true.
                  visibility: frontend
                  type: boolean
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/core-components"
  - path: node_modules/@backstage/plugin-catalog/config.d.ts
    value:
      type: object
      properties:
        catalog:
          type: object
          properties:
            experimentalPagination:
              deepVisibility: frontend
              anyOf:
                - type: object
                  properties:
                    limit:
                      type: number
                - type: boolean
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/plugin-catalog"
  - path: node_modules/@backstage/plugin-catalog-import/config.d.ts
    value:
      type: object
      properties:
        catalog:
          description: Configuration options for the catalog plugin.
          type: object
          properties:
            import:
              description: List of import flow specific options and attributes
              type: object
              properties:
                entityFilename:
                  description: Catalog entity descriptor filename, defaults to "catalog-info.yaml"
                  visibility: frontend
                  type: string
                pullRequestBranchName:
                  description: >-
                    A branch name used in pull request when registering existing
                    component via UI

                    Valid git refname required, see:
                    https://git-scm.com/docs/git-check-ref-format

                    Defaults to "backstage-integration"
                  visibility: frontend
                  type: string
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/plugin-catalog-import"
  - path: node_modules/@backstage/plugin-search/config.d.ts
    value:
      type: object
      properties:
        search:
          description: Configuration options for the search plugin
          type: object
          properties:
            defaultType:
              description: The default search type to be used when no specific type is
                selected.
              visibility: frontend
              type: string
            query:
              description: |-
                An object representing the default search query configuration.
                By configuring and modifying the values of this object,
                you can customize the default values of the search queries
                and define how it behaves by default.
              type: object
              properties:
                pageLimit:
                  description: >-
                    A number indicating the maximum number of results to be
                    returned

                    per page during pagination.
                  visibility: frontend
                  enum:
                    - 10
                    - 100
                    - 25
                    - 50
                  type: number
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/plugin-search"
  - path: node_modules/@backstage/plugin-techdocs/config.d.ts
    value:
      type: object
      properties:
        techdocs:
          description: Configuration options for the techdocs plugin
          type: object
          properties:
            builder:
              description: Documentation building process depends on the builder attr
              visibility: frontend
              enum:
                - external
                - local
              type: string
            legacyUseCaseSensitiveTripletPaths:
              description: Allows fallback to case-sensitive triplets in case of migration
                issues.
              visibility: frontend
              type: boolean
            sanitizer:
              type: object
              properties:
                allowedIframeHosts:
                  description: >-
                    Allows iframe tag only for listed hosts

                    Example:
                     allowedIframeHosts: ["example.com"]
                     this will allow all iframes with the host `example.com` in the src attribute
                  visibility: frontend
                  type: array
                  items:
                    type: string
                allowedCustomElementTagNameRegExp:
                  description: >-
                    Allows listed custom element tag name regex

                    Example:
                     allowedCustomElementTagNameRegExp: '^backstage-'
                     this will allow all custom elements with tag name matching `^backstage-` like <backstage-custom-element /> etc.
                  visibility: frontend
                  type: string
                allowedCustomElementAttributeNameRegExp:
                  description: >-
                    Allows listed custom element attribute name regex

                    Example:
                     allowedCustomElementAttributeNameRegExp: 'attribute1|attribute2'
                     this will allow all custom element attributes matching `attribute1` or `attribute2` like <backstage-custom-element attribute1="yes" attribute2/>
                  visibility: frontend
                  type: string
                additionalAllowedURIProtocols:
                  description: >-
                    Allows listed protocols in attributes with URI values

                    Example:
                     additionalAllowedURIProtocols: ['vscode']
                     this will allow all attributes with URI values to have `vscode` protocol like `vscode://some/path` in addition to the default protocols
                     matched by DOMPurify's IS_ALLOWED_URI RegExp:
                  visibility: frontend
                  type: array
                  items:
                    type: string
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/plugin-techdocs"
  - path: node_modules/@backstage/backend-defaults/config.d.ts
    value:
      type: object
      properties:
        app:
          type: object
          properties:
            baseUrl:
              type: string
          required:
            - baseUrl
        backend:
          type: object
          properties:
            baseUrl:
              description: >-
                The full base URL of the backend, as seen from the browser's
                point of

                view as it makes calls to the backend.
              type: string
            lifecycle:
              type: object
              properties:
                startupRequestPauseTimeout:
                  description: >-
                    The maximum time that paused requests will wait for the
                    service to start, before returning an error.

                    Defaults to 5 seconds

                    Supported formats:

                    - A string in the format of '1d', '2 seconds' etc. as
                    supported by the `ms`
                      library.
                    - A standard ISO formatted duration string, e.g. 'P2DT6H' or
                    'PT1M'.

                    - An object with individual units (in plural) as keys, e.g.
                    `{ days: 2, hours: 6 }`.
                serverShutdownDelay:
                  description: >-
                    The minimum time that the HTTP server will delay the
                    shutdown of the backend. During this delay health checks
                    will be set to failing, allowing traffic to drain.

                    Defaults to 0 seconds.

                    Supported formats:

                    - A string in the format of '1d', '2 seconds' etc. as
                    supported by the `ms`
                      library.
                    - A standard ISO formatted duration string, e.g. 'P2DT6H' or
                    'PT1M'.

                    - An object with individual units (in plural) as keys, e.g.
                    `{ days: 2, hours: 6 }`.
            trustProxy:
              description: Corresponds to the Express `trust proxy` setting.
              anyOf:
                - type: array
                  items:
                    type: string
                - type:
                    - string
                    - number
                    - boolean
            listen:
              description: Address that the backend should listen to.
              anyOf:
                - type: object
                  properties:
                    host:
                      description: Address of the interface that the backend should bind to.
                      type: string
                    port:
                      description: Port that the backend should listen to.
                      type:
                        - string
                        - number
                - type: string
            https:
              description: >-
                HTTPS configuration for the backend. If omitted the backend will
                serve HTTP.


                Setting this to `true` will cause self-signed certificates to be
                generated, which

                can be useful for local development or other non-production
                scenarios.
              anyOf:
                - type: object
                  properties:
                    certificate:
                      description: Certificate configuration
                      type: object
                      properties:
                        cert:
                          description: PEM encoded certificate. Use $file to load in a file
                          type: string
                        key:
                          description: PEM encoded certificate key. Use $file to load in a file.
                          visibility: secret
                          type: string
                      required:
                        - cert
                        - key
                - const: true
                  type: boolean
            server:
              description: >-
                Server-level HTTP options configuration for the backend.

                These options are passed directly to the underlying Node.js HTTP
                server.


                Timeout values support multiple formats:

                - A number in milliseconds

                - A string in the format of '1d', '2 seconds' etc. as supported
                by the `ms` library

                - A standard ISO formatted duration string, e.g. 'P2DT6H' or
                'PT1M'

                - An object with individual units (in plural) as keys, e.g. `{
                days: 2, hours: 6 }`
              type: object
              properties:
                headersTimeout:
                  description: Sets the timeout value for receiving the complete HTTP headers from
                    the client.
                requestTimeout:
                  description: Sets the timeout value for receiving the entire request (headers
                    and body) from the client.
                keepAliveTimeout:
                  description: Sets the timeout value for inactivity on a socket during
                    keep-alive.
                timeout:
                  description: Sets the timeout value for sockets.
                maxHeadersCount:
                  description: Limits maximum incoming headers count.
                  type: number
                maxRequestsPerSocket:
                  description: Sets the maximum number of requests socket can handle before
                    closing keep alive connection.
                  type: number
            auditor:
              description: Options used by the default auditor service.
              type: object
              properties:
                severityLogLevelMappings:
                  description: >-
                    Defines how audit event severity levels are mapped to log
                    levels.

                    This allows you to control the verbosity of audit logs based
                    on the

                    severity of the event. For example, you might want to log
                    'low' severity

                    events as 'debug' messages, while logging 'critical' events
                    as 'error'

                    messages. Each severity level ('low', 'medium', 'high',
                    'critical')

                    can be mapped to one of the standard log levels ('debug',
                    'info', 'warn', 'error').


                    By default, audit events are mapped to log levels as
                    follows:

                    - `low`: `debug`

                    - `medium`: `info`

                    - `high`: `info`

                    - `critical`: `info`
                  type: object
                  properties:
                    low:
                      enum:
                        - debug
                        - error
                        - info
                        - warn
                      type: string
                    medium:
                      enum:
                        - debug
                        - error
                        - info
                        - warn
                      type: string
                    high:
                      enum:
                        - debug
                        - error
                        - info
                        - warn
                      type: string
                    critical:
                      enum:
                        - debug
                        - error
                        - info
                        - warn
                      type: string
            actions:
              description: Options used by the default actions service.
              type: object
              properties:
                pluginSources:
                  description: List of plugin sources to load actions from.
                  type: array
                  items:
                    type: string
                filter:
                  description: >-
                    Filter configuration for actions. Allows controlling which
                    actions

                    are exposed to consumers based on patterns and attributes.
                  type: object
                  properties:
                    include:
                      description: >-
                        Rules for actions to include. An action must match at
                        least one rule to be included.

                        Each rule can specify an id pattern and/or attribute
                        constraints.

                        If no include rules are specified, all actions are
                        included by default.
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            description: >-
                              Glob pattern for action IDs to match.

                              Action IDs have the format
                              `{pluginId}:{actionName}`.
                            type: string
                          attributes:
                            description: >-
                              Attribute constraints. All specified attributes
                              must match.

                              Actions are compared against their resolved
                              attributes (with defaults applied).
                            type: object
                            properties:
                              destructive:
                                description: >-
                                  If specified, only match actions where
                                  destructive matches this value.

                                  Actions default to destructive: true if not
                                  explicitly set.
                                type: boolean
                              readOnly:
                                description: >-
                                  If specified, only match actions where
                                  readOnly matches this value.

                                  Actions default to readOnly: false if not
                                  explicitly set.
                                type: boolean
                              idempotent:
                                description: >-
                                  If specified, only match actions where
                                  idempotent matches this value.

                                  Actions default to idempotent: false if not
                                  explicitly set.
                                type: boolean
                    exclude:
                      description: >-
                        Rules for actions to exclude. Exclusions take precedence
                        over inclusions.

                        Each rule can specify an id pattern and/or attribute
                        constraints.
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            description: >-
                              Glob pattern for action IDs to match.

                              Action IDs have the format
                              `{pluginId}:{actionName}`.
                            type: string
                          attributes:
                            description: >-
                              Attribute constraints. All specified attributes
                              must match.

                              Actions are compared against their resolved
                              attributes (with defaults applied).
                            type: object
                            properties:
                              destructive:
                                description: >-
                                  If specified, only match actions where
                                  destructive matches this value.

                                  Actions default to destructive: true if not
                                  explicitly set.
                                type: boolean
                              readOnly:
                                description: >-
                                  If specified, only match actions where
                                  readOnly matches this value.

                                  Actions default to readOnly: false if not
                                  explicitly set.
                                type: boolean
                              idempotent:
                                description: >-
                                  If specified, only match actions where
                                  idempotent matches this value.

                                  Actions default to idempotent: false if not
                                  explicitly set.
                                type: boolean
            auth:
              description: Options used by the default auth, httpAuth and userInfo services.
              type: object
              properties:
                keys:
                  description: Keys shared by all backends for signing and validating backend
                    tokens.
                  deprecated: this will be removed when the backwards compatibility is no longer
                    needed with backend-common
                  type: array
                  items:
                    type: object
                    properties:
                      secret:
                        description: >-
                          Secret for generating tokens. Should be a base64
                          string, recommended

                          length is 24 bytes.
                        visibility: secret
                        type: string
                    required:
                      - secret
                dangerouslyDisableDefaultAuthPolicy:
                  description: >-
                    This disables the otherwise default auth policy, which
                    requires all

                    requests to be authenticated with either user or service
                    credentials.


                    Disabling this check means that the backend will no longer
                    block

                    unauthenticated requests, but instead allow them to pass
                    through to

                    plugins.


                    If permissions are enabled, unauthenticated requests will be
                    treated

                    exactly as such, leaving it to the permission policy to
                    determine what

                    permissions should be allowed for an unauthenticated
                    identity. Note

                    that this will also apply to service-to-service calls
                    between plugins

                    unless you configure credentials for service calls.
                  type: boolean
                pluginKeyStore:
                  description: Controls how to store keys for plugin-to-plugin auth
                  anyOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          const: database
                      required:
                        - type
                    - type: object
                      properties:
                        type:
                          type: string
                          const: static
                        static:
                          type: object
                          properties:
                            keys:
                              description: Must be declared at least once and the first one will be used for
                                signing.
                              type: array
                              items:
                                type: object
                                properties:
                                  publicKeyFile:
                                    description: Path to the public key file in the SPKI format. Should be an
                                      absolute path.
                                    type: string
                                  privateKeyFile:
                                    description: >-
                                      Path to the matching private key file in
                                      the PKCS#8 format. Should be an absolute
                                      path.


                                      The first array entry must specify a
                                      private key file, the rest must not.
                                    type: string
                                  keyId:
                                    description: ID to uniquely identify this key within the JWK set.
                                    type: string
                                  algorithm:
                                    description: >-
                                      JWS "alg" (Algorithm) Header Parameter
                                      value. Defaults to ES256.

                                      Must match the algorithm used to generate
                                      the keys in the provided files
                                    type: string
                                required:
                                  - keyId
                                  - publicKeyFile
                          required:
                            - keys
                      required:
                        - static
                        - type
                externalAccess:
                  description: >-
                    Configures methods of external access, ie ways for callers
                    outside of

                    the Backstage ecosystem to get authorized for access to APIs
                    that do

                    not permit unauthorized access.
                  type: array
                  items:
                    anyOf:
                      - type: object
                        properties:
                          type:
                            description: >-
                              This is the legacy service-to-service access
                              method, where a set

                              of static keys were shared among plugins and used
                              for symmetric

                              signing and verification. These correspond to the
                              old

                              `backend.auth.keys` set and retain their behavior
                              for backwards

                              compatibility. Please migrate to other access
                              methods when

                              possible.


                              Callers generate JWT tokens with the following
                              payload:


                              ```json

                              {
                                "sub": "backstage-plugin",
                                "exp": <epoch seconds one hour in the future>
                              }

                              ```


                              And sign them with HS256, using the base64 decoded
                              secret. The

                              tokens are then passed along with requests in the
                              Authorization

                              header:


                              ```

                              Authorization: Bearer eyJhbGciOiJIUzI...

                              ```
                            type: string
                            const: legacy
                          options:
                            type: object
                            properties:
                              secret:
                                description: |-
                                  Any set of base64 encoded random bytes to be used as both the
                                  signing and verification key. Should be sufficiently long so as
                                  not to be easy to guess by brute force.

                                  Can be generated eg using

                                  ```sh
                                  node -p 'require("crypto").randomBytes(24).toString("base64")'
                                  ```
                                visibility: secret
                                type: string
                              subject:
                                description: >-
                                  Sets the subject of the principal, when
                                  matching this token.

                                  Useful for debugging and tracking purposes.
                                type: string
                            required:
                              - secret
                              - subject
                          accessRestrictions:
                            description: >-
                              Restricts what types of access that are permitted
                              for this access

                              method. If no access restrictions are given, it'll
                              have unlimited

                              access. This access restriction applies for the
                              framework level;

                              individual plugins may have their own access
                              control mechanisms

                              on top of this.
                            type: array
                            items:
                              type: object
                              properties:
                                plugin:
                                  description: >-
                                    Permit access to make requests to this
                                    plugin.


                                    Can be further refined by setting additional
                                    fields below.
                                  type: string
                                permission:
                                  description: >-
                                    If given, this method is limited to only
                                    performing actions

                                    with these named permissions in this plugin.


                                    Note that this only applies where
                                    permissions checks are

                                    enabled in the first place. Endpoints that
                                    are not protected by

                                    the permissions system at all, are not
                                    affected by this

                                    setting.
                                  anyOf:
                                    - type: array
                                      items:
                                        type: string
                                    - type: string
                                permissionAttribute:
                                  description: >-
                                    If given, this method is limited to only
                                    performing actions

                                    whose permissions have these attributes.


                                    Note that this only applies where
                                    permissions checks are

                                    enabled in the first place. Endpoints that
                                    are not protected by

                                    the permissions system at all, are not
                                    affected by this

                                    setting.
                                  type: object
                                  properties:
                                    action:
                                      description: One of more of 'create', 'read', 'update', or 'delete'.
                                      anyOf:
                                        - type: array
                                          items:
                                            type: string
                                        - type: string
                              required:
                                - plugin
                        required:
                          - options
                          - type
                      - type: object
                        properties:
                          type:
                            description: >-
                              This access method consists of random static
                              tokens that can be

                              handed out to callers.


                              The tokens are then passed along verbatim with
                              requests in the

                              Authorization header:


                              ```

                              Authorization: Bearer
                              eZv5o+fW3KnR3kVabMW4ZcDNLPl8nmMW

                              ```
                            type: string
                            const: static
                          options:
                            type: object
                            properties:
                              token:
                                description: |-
                                  A raw token that can be any string, but for security reasons
                                  should be sufficiently long so as not to be easy to guess by
                                  brute force.

                                  Can be generated eg using

                                  ```sh
                                  node -p 'require("crypto").randomBytes(24).toString("base64")'
                                  ```

                                  Since the tokens can be any string, you are free to add
                                  additional identifying data to them if you like. For example,
                                  adding a `freben-local-dev-` prefix for debugging purposes to a
                                  token that you know will be handed out for use as a personal
                                  access token during development.
                                visibility: secret
                                type: string
                              subject:
                                description: >-
                                  Sets the subject of the principal, when
                                  matching this token.

                                  Useful for debugging and tracking purposes.
                                type: string
                            required:
                              - subject
                              - token
                          accessRestrictions:
                            description: >-
                              Restricts what types of access that are permitted
                              for this access

                              method. If no access restrictions are given, it'll
                              have unlimited

                              access. This access restriction applies for the
                              framework level;

                              individual plugins may have their own access
                              control mechanisms

                              on top of this.
                            type: array
                            items:
                              type: object
                              properties:
                                plugin:
                                  description: >-
                                    Permit access to make requests to this
                                    plugin.


                                    Can be further refined by setting additional
                                    fields below.
                                  type: string
                                permission:
                                  description: >-
                                    If given, this method is limited to only
                                    performing actions

                                    with these named permissions in this plugin.


                                    Note that this only applies where
                                    permissions checks are

                                    enabled in the first place. Endpoints that
                                    are not protected by

                                    the permissions system at all, are not
                                    affected by this

                                    setting.
                                  anyOf:
                                    - type: array
                                      items:
                                        type: string
                                    - type: string
                                permissionAttribute:
                                  description: >-
