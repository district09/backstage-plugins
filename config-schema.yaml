    packageName: "@backstage/plugin-events-node"
  - path: node_modules/@backstage/plugin-catalog-backend-module-logs/node_modules/@backstage/plugin-catalog-backend/config.d.ts
    value:
      type: object
      properties:
        catalog:
          description: Configuration options for the catalog plugin.
          type: object
          properties:
            rules:
              description: >-
                Rules to apply to all catalog entities, from any location.


                An undefined list of matchers means match all, an empty list of

                matchers means match none.


                This is commonly used to put in what amounts to an allowlist of
                kinds

                that regular users of Backstage are permitted to register
                locations

                for. This can be used to stop them from registering yaml files

                describing for example a Group entity called "admin" that they
                make

                themselves members of, or similar.
              type: array
              items:
                type: object
                properties:
                  allow:
                    description: >-
                      Allow entities of these particular kinds.


                      E.g. ["Component", "API", "Template", "Location"]


                      You can also specify the type of the entity by using an
                      object with `kind` and optional `spec.type` properties.

                      E.g. [{ kind: "Component", 'spec.type': "service" }]
                    type: array
                    items:
                      anyOf:
                        - type: object
                          properties:
                            kind:
                              type: string
                            spec.type:
                              type: string
                          required:
                            - kind
                        - type: string
                  locations:
                    description: >-
                      Limit this rule to a specific location


                      Example with a fixed location
                       { "type": "url", "exact": "https://github.com/a/b/blob/file.yaml"}

                      Example using a Regex
                       { "type": "url", "pattern": "https://github.com/org/*\/blob/master/*.yaml"}

                      Using both exact and pattern will result in an error
                      starting the application
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          description: The type of location, e.g. "url".
                          type: string
                        exact:
                          description: |-
                            The exact location, e.g.
                            "https://github.com/org/repo/blob/master/users.yaml".

                            The exact location can also be used to match on locations
                            that contain glob characters themselves, e.g.
                            "https://github.com/org/*\/blob/master/*.yaml".
                          type: string
                        pattern:
                          description: |-
                            The pattern allowed for the location, e.g.
                            "https://github.com/org/*\/blob/master/*.yaml".
                          type: string
                      required:
                        - type
                required:
                  - allow
            readonly:
              description: >-
                Readonly defines whether the catalog allows writes after
                startup.


                Setting 'readonly=false' allows users to register their own
                components.

                This is the default value.


                Setting 'readonly=true' configures catalog to only allow reads.
                This can

                be used in combination with static locations to only serve
                operator

                provided locations. Effectively this removes the ability to
                register new

                components to a running backstage instance.
              type: boolean
            locations:
              description: >-
                A set of static locations that the catalog shall always keep
                itself

                up-to-date with. This is commonly used for large, permanent
                integrations

                that are defined by the Backstage operators at an organization,
                rather

                than individual things that users register dynamically.


                These have (optional) rules of their own. These override what
                the global

                rules above specify. This way, you can prevent everybody from
                register

                e.g. User and Group entities, except for one or a few static
                locations

                that have those two kinds explicitly allowed.


                For example:


                ```yaml

                rules:
                  - allow: [Component, API, Template, Location]
                locations:
                  - type: url
                    target: https://github.com/org/repo/blob/master/users.yaml
                    rules:
                      - allow: [User, Group]
                  - type: url
                    target: https://github.com/org/repo/blob/master/systems.yaml
                    rules:
                      - allow: [System]
                ```
              type: array
              items:
                type: object
                properties:
                  type:
                    description: The type of location, e.g. "url".
                    type: string
                  target:
                    description: |-
                      The target URL of the location, e.g.
                      "https://github.com/org/repo/blob/master/users.yaml".
                    type: string
                  rules:
                    description: >-
                      Optional extra rules that apply to this particular
                      location.


                      These override the global rules above.
                    type: array
                    items:
                      type: object
                      properties:
                        allow:
                          description: |-
                            Allow entities of these particular kinds.

                            E.g. ["Group", "User"]
                          type: array
                          items:
                            type: string
                      required:
                        - allow
                required:
                  - target
                  - type
            enableRelationsCompatibility:
              description: >-
                Enables the compatibility layer for relations in returned
                entities that

                ensures that all relations objects have both `target` and
                `targetRef`.


                Enabling this option significantly increases the memory usage of
                the

                catalog, and slightly reduces performance, but may avoid
                breaking consumers that

                rely on the existence of `target` in the relations objects.
              type: boolean
            disableDefaultProcessors:
              description: >-
                Disables the default backstage processors.


                Enabling this option allows more complete control of which
                processors are included

                in the backstage processing loop.
              type: boolean
            orphanStrategy:
              description: >-
                The strategy to use for entities that are orphaned, i.e. no
                longer have

                any other entities or providers referencing them. The default
                value is

                "delete".
              enum:
                - delete
                - keep
              type: string
            orphanProviderStrategy:
              description: >-
                The strategy to use for entities that are referenced by
                providers that are orphaned,

                i.e. entities with no providers currently configured in the
                catalog. The default value is

                "delete".
              enum:
                - delete
                - keep
              type: string
            stitchingStrategy:
              description: The strategy to use when stitching together the final entities. The
                default mode is "deferred".
              anyOf:
                - type: object
                  properties:
                    mode:
                      description: Perform stitching in-band immediately when needed
                      type: string
                      const: immediate
                  required:
                    - mode
                - type: object
                  properties:
                    mode:
                      description: Defer stitching to be performed asynchronously
                      type: string
                      const: deferred
                    pollingInterval:
                      description: Polling interval for tasks in seconds
                    stitchTimeout:
                      description: How long to wait for a stitch to complete before giving up in
                        seconds
                  required:
                    - mode
            defaultLocationConflictStrategy:
              description: >-
                The strategy to use when there is a conflict with a location
                being registered.


                The default value is "reject".


                The "refresh" strategy will refresh the existing location
                instead of throwing a conflict error.
              enum:
                - refresh
                - reject
              type: string
            processingInterval:
              description: The interval at which the catalog should process its entities.
            providerOptions:
              description: Provider-specific additional configuration options.
              type: object
              additionalProperties:
                type: object
                properties:
                  disabled:
                    description: >-
                      Determines whether this provider is disabled or not. If
                      not specified,

                      defaults to false.
                    type: boolean
            processorOptions:
              description: Processor-specific additional configuration options.
              type: object
              additionalProperties:
                type: object
                properties:
                  disabled:
                    description: >-
                      Determines whether this processor is disabled or not. If
                      not specified,

                      defaults to false.
                    type: boolean
                  priority:
                    description: The default priority is 20, and lower value means that the
                      processor runs earlier.
                    type: number
            scmEvents:
              description: >-
                Settings that control what to do when receiving messages from
                the SCM

                events service.
              anyOf:
                - type: object
                  properties:
                    refresh:
                      description: >-
                        Trigger refreshes (reprocessing) of entities that are
                        affected by an

                        SCM event. This may include source control file content
                        changes,

                        repository status changes, etc.
                      type: boolean
                    unregister:
                      description: Unregister entities that are deleted as a result of an SCM event.
                      type: boolean
                    move:
                      description: Move entities that are moved as a result of an SCM event.
                      type: boolean
                - type: boolean
      $schema: http://json-schema.org/draft-07/schema#
    packageName: "@backstage/plugin-catalog-backend"
