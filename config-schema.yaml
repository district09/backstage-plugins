  - path: node_modules/@backstage/backend-app-api/config.d.ts
    value:
      type: object
      properties:
        backend:
          type: object
          properties:
            packages:
              description: Used by the feature discovery service
              anyOf:
                - type: object
                  properties:
                    include:
                      type: array
                      items:
                        type: string
                    exclude:
                      type: array
                      items:
                        type: string
                - const: all
                  type: string
            startup:
              type: object
              properties:
                default:
                  type: object
                  properties:
                    onPluginBootFailure:
                      description: >-
                        The default value for `onPluginBootFailure` if not
                        specified for a particular plugin.

                        This defaults to 'abort', which means
                        `onPluginBootFailure: continue` must be specified

                        for backend startup to continue on plugin boot failure.
                        This can also be set to

                        'continue', which flips the logic for individual plugins
                        so that they must be set to

                        `onPluginBootFailure: abort` to be required.
                      enum:
                        - abort
                        - continue
                      type: string
                    onPluginModuleBootFailure:
                      description: >-
                        The default value for `onPluginModuleBootFailure` if not
                        specified for a particular plugin module.

                        This defaults to 'abort', which means
                        `onPluginModuleBootFailure: continue` must be specified

                        for backend startup to continue on plugin module boot
                        failure. This can also be set to

                        'continue', which flips the logic for individual plugin
                        modules so that they must be set to

                        `onPluginModuleBootFailure: abort` to be required.
                      enum:
                        - abort
                        - continue
                      type: string
                plugins:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      onPluginBootFailure:
                        description: >-
                          Used to control backend startup behavior when this
                          plugin fails to boot up. Setting

                          this to `continue` allows the backend to continue
                          starting up, even if this plugin

                          fails. This can enable leaving a crashing plugin
                          installed, but still permit backend

                          startup, which may help troubleshoot data-dependent
                          issues. Plugin failures for plugins

                          set to `abort` are fatal (this is the default unless
                          overridden by the `default`

                          setting).
                        enum:
                          - abort
                          - continue
                        type: string
                      modules:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            onPluginModuleBootFailure:
                              description: >-
                                Used to control backend startup behavior when
                                this plugin module fails to boot up. Setting

                                this to `continue` allows the backend to
                                continue starting up, even if this plugin

                                module fails. This can enable leaving a crashing
                                plugin installed, but still permit backend

                                startup, which may help troubleshoot
                                data-dependent issues. Plugin module failures
                                for plugin modules

                                set to `abort` are fatal (this is the default
                                unless overridden by the `default`

                                setting).
                              enum:
                                - abort
                                - continue
                              type: string
