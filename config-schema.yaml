                            items:
                              type: string
                          skipSuccessfulRequests:
                            description: >-
                              Skip rate limiting for requests that have been
                              successful.

                              Defaults to false.
                            type: boolean
                          skipFailedRequests:
                            description: |-
                              Skip rate limiting for requests that have failed.
                              Defaults to false.
                            type: boolean
                - const: true
