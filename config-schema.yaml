                        type: array
                        items:
                          type: string
                    required:
                      - host
          required:
            - baseUrl
            - database
        discovery:
          description: Options used by the default discovery service.
          type: object
          properties:
            endpoints:
              description: A list of target base URLs and their associated plugins.
              type: array
              items:
                type: object
                properties:
                  target:
